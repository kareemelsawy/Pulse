<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>Pulse</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B8EF7"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#shine)"/>

  <!-- 4-pointed star: each arm uses cubic bezier for the soft tapered shape -->
  <path
    d="M 256,90
       C 242,180 180,242 90,256
       C 180,270 242,332 256,422
       C 270,332 332,270 422,256
       C 332,242 270,180 256,90 Z"
    fill="#ffffff"
  />
</svg>
